


<!DOCTYPE html>
<html translate="no">
<head>
    <title>Đăng nhập</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Cổng thông tin người học TDTU" />
    <meta name="robots" content="noodp,noydir" />
    <link rel="shortcut icon" href="/logo.ico" />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YTX9PEC6H2"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-YTX9PEC6H2');
    </script>
    <!--===============================================================================================-->
    <link rel="stylesheet" type="text/css" href="/css/login/util.css">
    <link rel="stylesheet" type="text/css" href="/css/login/main.css?v=20240729" />

    <!--===============================================================================================-->
    <link href="/css/boostrap4/bootstrap.css" rel="stylesheet" type="text/css" />
    <link href="/css/bootstrap.min.css" rel="stylesheet" type="text/css" />

    <script src="/js/jquery/jquery-3.2.1.min.js"></script>
    <!--===============================================================================================-->
    <link rel="stylesheet" type="text/css" href="/fonts/font-awesome-4.7.0/css/font-awesome.min.css">

    <!--======bootbox - only apply bootstrap 3=========================================================================================-->
    <link href="/css/bootstrap.min.css" rel="stylesheet" />
    <script src="/js/jquery-2.2.4.min.js"></script>
    <script src="/js/bootstrap.min.js"></script>
    <script src="/js/bootbox.min.js"></script>
    <!-- CSS | Preloader Styles -->
    <link href="/css/preloader.css" rel="stylesheet" type="text/css" />
    <link href="/css/login/image-effect.css" rel="stylesheet" />

    <style>
        .login-card-img {
            border-radius: 0;
            position: absolute;
            width: 100%;
            height: 100%;
            -o-object-fit: cover;
            object-fit: cover;
            margin-left: -15px !important;
        }

        .text-logo {
            word-wrap: break-word;
            width: 200px;
            font-family: Roboto Bold;
            font-weight: 900;
            line-height: 50px;
            margin-left: 10px;
        }

        .right_back_version {
            width: 190px;
            background-color: #2daaed;
            height: 41px;
            bottom: 65px;
            z-index: 9999;
            position: fixed;
            right: 0px;
            cursor: pointer;
            padding: 10px;
        }

            .right_back_version:hover {
                background-color: #5dade2;
            }


        .slideThree label {
            color: #fff;
            position: absolute;
            margin: auto;
            font-size: 14px;
            width: 170px;
            height: 30px;
            text-align: center;
            cursor: pointer;
        }
    </style>

</head>
<body>
    <!-- preloader -->
    <div id="preloader" class="hide">
        <div id="spinner">
            <div class="preloader-dot-loading">
                <div class="cssload-loading"><i></i><i></i><i></i><i></i></div>
            </div>
        </div>
    </div>


    <!-- Main Content -->

    <div class="limiter">
        <div class="container-login100">
            <div class="wrap-login100">
                <div class="col-sm-6 col-lg-5 hidden-xs">
                    <img src="/images/login/background.png" alt="login" class="login-card-img">
                    <div style="position: absolute; top: 150px; left: 100px">
                        <img src="/images/LogoTDTBgWhite.png" alt="logo" width="150px">
                        <h1 class="text-white text-logo">C&#x1ED4;NG TH&#xD4;NG TIN SINH VI&#xCA;N</h1>
                    </div>
                </div>

                <div class="col-sm-6 col-lg-7">
                    <div class="col-md-12 text-right" style="padding: 10px">
                                <a href="#" class="culture" name="culture">
                                    <img src="/images/Flag_of_the_United_Kingdom.png" style="height:20px;" />
                                </a>
                        <input value="vi" type="hidden" id="currentCulture" />
                    </div>
                    <form class="login100-form">

                        <div class="login100-form-title">
                            <h2 style="text-align:center;width:100%; " class="text-uppercase text-danger"><b>Xin chào!</b></h2>

                            <div class="text-center p-t-12">
                                <span class="txt1">
                                        <a href="https://www.facebook.com/tdtsoftware" class="social-icon bg-blue ">
                                            <i class="fa fa-facebook-f" aria-hidden="true"></i>
                                        </a>
                                    <label style="width:10px;" class="social-icon"></label>
                                </span>
                            </div>
                        </div>

                        <div class="wrap-input100">
                            <input class="input100" type="text" name="email" id="txtUser" placeholder="Nhập MSSV" autofocus>
                            <span class="focus-input100"></span>
                            <span class="symbol-input100">
                                <i class="fa fa fa-user" aria-hidden="true"></i>
                            </span>
                        </div>

                        <div class="wrap-input100">
                            <span class="show-input100">
                                <i id="showPass" class="fa fa-eye" aria-hidden="true"></i>
                            </span>
                            <input class="input100" type="password" name="password" id="txtPass" placeholder="Nhập mật khẩu">
                            <span class="focus-input100"></span>
                            <span class="symbol-input100">
                                <i class="fa fa-lock" aria-hidden="true"></i>
                            </span>
                        </div>

                        <div class="container-login100-form-btn">
                            <button class="login100-form-btn" id="btnLogIn">
                                Đăng nhập
                            </button>
                        </div>

                    </form>
                    <div class="row" style="float:right; display:table-cell;vertical-align: bottom;">
                        <div>
                                    <a href="#">
                                        <img src="/images/login/new-04.png" style="height:10em; vertical-align: bottom; " />
                                    </a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        $(document).ready(function () {
            $('.culture').on('click', function () {
                $.ajax({
                    async: true,
                    type: "post",
                    url: "/Home/SetLanguage",
                    data: {
                        returnUrl: "/login/index"
                    },
                    success: function (result) {
                        location.reload();
                    },
                    error: function () {
                        location.reload();
                    }
                });
            });

            sessionStorage.setItem("popupLePhepDisplayed", "false");
            //$(document).keypress(function (e) {
            //    var keycode = e.keyCode || e.which;
            //    if (keycode == 13) { //enter
            //        Login();
            //    }
            //});

            $("#btnLogIn").on("click", function (e) {
                e.preventDefault();
                Login();
            });

            $("#showPass").on("click", function (e) {
                if ($("#txtPass").attr("type") == "password") {
                    $("#txtPass").attr("type", "text");
                    $(this).removeClass("fa-eye").addClass("fa-eye-slash");
                } else {
                    $("#txtPass").attr("type", "password");
                    $(this).removeClass("fa-eye-slash").addClass("fa-eye");
                }
            });

            function Login() {
                var user = $("#txtUser").val().trim();
                var pass = $("#txtPass").val().trim();

                var urlParams = new URLSearchParams(window.location.search.toLowerCase());
                var returnURL = urlParams.get('returnurl') == null ? "" : urlParams.get('returnurl');

                $("#preloader").removeClass("hide");

                 $.ajax({
                    async: true,
                    type: "post",
                    url: "/Login/SignIn?ReturnURL=" + returnURL,
                    data: {
                        user,
                        pass
                    },
                     success: function (result) {
                         if (result.result == "fail") {
                             $("#preloader").addClass("hide");
                             bootbox.alert({
                                 message: 'Sai tên đăng nhập hoặc mật khẩu! Vui lòng kiểm tra và đăng nhập lại!'
                             }).addClass("modal-dialog-centered");
                         }
                         else if (result.result == "T") {
                             $("#preloader").addClass("hide");
                             bootbox.alert({
                                 message: 'Tài khoản của bạn đã bị khóa do đã tốt nghiệp, vui lòng sử dụng email để liên hệ Nhà trường!'
                             }).addClass("modal-dialog-centered");
                         }
                         else if (result.result == "*") {
                             $("#preloader").addClass("hide");
                             bootbox.alert({
                                 message: 'Tài khoản của bạn đã bị khóa do đã thôi học!'
                             }).addClass("modal-dialog-centered");
                         }
                         else if (result.result == "chualamcamketgiaothong") {
                             $("#preloader").addClass("hide");
                             bootbox.alert({
                                 size: "large",
                                 message: '<h3 class="text-center">Tài khoản của bạn chưa thực hiện cam kết giao thông!</h3><br/><h4 class="text-center"> Trình duyệt sẽ chuyển hướng đến trang cam kết sau 5 giây.</h4>',
                                 //callback: function () {
                                 //    // This code runs ONLY after the user clicks "OK"
                                 //    setTimeout(function () {
                                 //        window.location.href = result.url;
                                 //    }, 3000);
                                 //}
                             }).addClass("modal-dialog-centered");
                             setTimeout(function () {
                                 window.location.href = result.url;
                             }, 5000);
                         }
                         else if (result.result == "chualamcamketmatuy") {
                             $("#preloader").addClass("hide");
                             bootbox.alert({
                                 size: "large",
                                 message: '<h3 class="text-center">Tài khoản của bạn chưa thực hiện cam kết phòng chống ma túy!</h3><br/><h4 class="text-center"> Trình duyệt sẽ chuyển hướng đến trang cam kết sau 3 giây.</h4>',
                                 //callback: function () {
                                 //    // This code runs ONLY after the user clicks "OK"
                                 //    setTimeout(function () {
                                 //        window.location.href = result.url;
                                 //    }, 3000);
                                 //}
                             }).addClass("modal-dialog-centered");
                             setTimeout(function () {
                                 window.location.href = result.url;
                             }, 3000);
                         }
                         else if (result.result == "chuathuchienshcd") {
                             $("#preloader").addClass("hide");
                             bootbox.alert({
                                 size: "large",
                                 message: '<h3 class="text-center">Tài khoản của bạn chưa tham gia Sinh hoạt công dân trực tuyến!</h3><br/><h4 class="text-center"> Trình duyệt sẽ chuyển hướng đến trang sinh hoạt công dân sau 3 giây.</h4>',
                             }).addClass("modal-dialog-centered");
                             setTimeout(function () {
                                 window.location.href = result.url;
                             }, 3000);
                         }
                         else {
                             window.location.href = result.url;
                         }

                     },
                     error: function () {
                        $("#preloader").addClass("hide");
                        bootbox.alert({
                            message: 'Tài khoản không tồn tại hoặc hệ thống quá tải. Vui lòng thử lại sau !'
                        }).addClass("modal-dialog-centered");
                    }
                });

            };
        })
    </script>
</body>
</html>
